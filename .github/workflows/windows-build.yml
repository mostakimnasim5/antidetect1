name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ===========================================================================
  # BUILD WINDOWS (MinGW)
  # ===========================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
    
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install MinGW
      run: choco install mingw -y
    
    - name: Configure CMake
      shell: cmd
      run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      shell: cmd
      run: cmake --build build --parallel 2
    
    - name: Show outputs
      shell: cmd
      run: |
        echo "=== Build Outputs ==="
        dir /s /b build\*.exe 2>nul || echo "No exe found"
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: build/**/*.exe
