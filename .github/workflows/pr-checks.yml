name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:

  # ===========================================================================
  # QUICK COMPILE CHECK
  # ===========================================================================
  compile-check:
    name: Compile Check
    runs-on: ubuntu-latest
    
    steps:
    
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ build-essential ninja-build
    
    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -GNinja
    
    - name: Compile
      run: |
        echo "=== Compiling ==="
        cmake --build build --parallel 2 2>&1 | tee build.log
        
        if grep -q "error:" build.log; then
          echo ""
          echo "=== ERRORS FOUND ==="
          grep "error:" build.log | head -20
          exit 1
        fi
        
        echo ""
        echo "✅ Compilation successful!"

    - name: Upload Log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

  # ===========================================================================
  # LINT CHECK
  # ===========================================================================
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    
    steps:
    
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install linters
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck
    
    - name: Run lint
      run: |
        echo "=== Lint Check ==="
        cppcheck --enable=all --std=c++20 -I include src/ 2>&1 | head -30 || echo "Lint complete"
