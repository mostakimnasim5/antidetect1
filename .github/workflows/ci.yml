# ==============================================================================
# AntiDetectPro - CI/CD Pipeline
# ==============================================================================
# Enterprise Android Anti-Detection System
# ==============================================================================

name: C++ CI/CD Pipeline

on:
  push:
    branches: [ main, develop, '**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  # ===========================================================================
  # JOB 1: STATIC ANALYSIS
  # ===========================================================================
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cppcheck cmake ninja-build build-essential
      
      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -GNinja
      
      - name: Run Clang-Tidy
        continue-on-error: true
        run: |
          echo "=== Clang-Tidy Analysis ==="
          find src include -name "*.cpp" -o -name "*.hpp" | \
            xargs clang-tidy -header-filter='.*' \
            -checks='-*,bugprone-*,clang-analyzer-*,performance-*,readability-*' \
            2>&1 | tee clang-tidy.log || true
          
          echo "=== Summary ==="
          grep -c "warning:" clang-tidy.log 2>/dev/null || echo "0 warnings"
      
      - name: Run Cppcheck
        continue-on-error: true
        run: |
          echo "=== Cppcheck Analysis ==="
          cppcheck --enable=all --std=c++20 \
            -I include -I src \
            src/ include/ 2>&1 | tee cppcheck.log || true
      
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: clang-tidy.log cppcheck.log
          retention-days: 7

  # ===========================================================================
  # JOB 2: BUILD LINUX (GCC)
  # ===========================================================================
  build-linux:
    name: Build Linux (GCC)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13 cmake ninja-build libssl-dev
      
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -GNinja
      
      - name: Build
        run: |
          cmake --build build --parallel 4 --config Release
      
      - name: List Outputs
        run: |
          echo "=== Build Outputs ==="
          ls -la build/*.a build/*.so 2>/dev/null || echo "Static/Dynamic libs"
          find build -name "AntiDetectPro" -o -name "*.a" -o -name "*.so" | head -10
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/**/*.a
            build/**/*.so
            build/AntiDetectPro
          retention-days: 7

  # ===========================================================================
  # JOB 3: BUILD LINUX (Clang)
  # ===========================================================================
  build-linux-clang:
    name: Build Linux (Clang)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 cmake ninja-build libssl-dev
      
      - name: Configure CMake
        run: |
          cmake -B build-clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -GNinja
      
      - name: Build
        run: cmake --build build-clang --parallel 4 --config Release
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-clang
          path: build-clang/**
          retention-days: 7

  # ===========================================================================
  # JOB 4: BUILD WINDOWS (MSVC)
  # ===========================================================================
  build-windows-msvc:
    name: Build Windows (MSVC)
    runs-on: windows-2022
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Install Ninja
        run: choco install ninja -y --no-progress
      
      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build-msvc ^
            -G "Visual Studio 17 2022" ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_FLAGS="/W4" ^
            -DCMAKE_CXX_FLAGS="/W4"
      
      - name: Build
        shell: cmd
        run: |
          cmake --build build-msvc --parallel 4 --config Release
      
      - name: List Outputs
        shell: cmd
        run: |
          echo "=== Outputs ==="
          dir /s /b build-msvc\*.exe 2>nul || echo "No exe"
          dir /s /b build-msvc\*.lib 2>nul || echo "No lib"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-msvc
          path: |
            build-msvc/**/*.exe
            build-msvc/**/*.dll
            build-msvc/**/*.lib
          retention-days: 7

  # ===========================================================================
  # JOB 5: BUILD WINDOWS (MinGW)
  # ===========================================================================
  build-windows-mingw:
    name: Build Windows (MinGW)
    runs-on: windows-2022
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install MinGW
        run: choco install mingw -y --no-progress
      
      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build-mingw ^
            -G "MinGW Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_SH=CMAKE_SH-NOTFOUND
      
      - name: Build
        shell: cmd
        run: cmake --build build-mingw --parallel 4 --config Release
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-mingw
          path: build-mingw/**/*.exe
          retention-days: 7

  # ===========================================================================
  # JOB 6: BUILD macOS
  # ===========================================================================
  build-macos:
    name: Build macOS
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          brew install cmake ninja openssl@3
      
      - name: Configure CMake
        run: |
          cmake -B build-macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -GNinja
      
      - name: Build
        run: cmake --build build-macos --parallel 4 --config Release
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build-macos/**
          retention-days: 7

  # ===========================================================================
  # JOB 7: CODE QUALITY
  # ===========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Statistics
        run: |
          echo "### Project Statistics"
          
          TOTAL_LINES=$(find src include -name "*.cpp" -o -name "*.hpp" | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          echo "| Metric | Count |"
          echo "|--------|-------|"
          echo "| Total Lines | $TOTAL_LINES |"
          
          CPP_FILES=$(find src -name "*.cpp" | wc -l)
          HPP_FILES=$(find include -name "*.hpp" | wc -l)
          echo "| C++ Files | $CPP_FILES |"
          echo "| Header Files | $HPP_FILES |"
          
          CLASSES=$(grep -r "class " include/ src/ 2>/dev/null | wc -l)
          echo "| Classes | $CLASSES |"
      
      - name: Check TODO/FIXME
        run: |
          TODO_COUNT=$(grep -rn "TODO\|FIXME\|XXX\|BUG" src/ include/ 2>/dev/null | wc -l || echo "0")
          echo "TODO/FIXME/BUG markers: $TODO_COUNT"
          if [ "$TODO_COUNT" -gt 0 ]; then
            grep -rn "TODO\|FIXME\|XXX\|BUG" src/ include/ 2>/dev/null || true
          fi

  # ===========================================================================
  # JOB 8: SECURITY SCAN
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Check Secrets
        run: |
          echo "=== Secret Check ==="
          FOUND=0
          for pattern in "password\s*=" "api[_-]?key\s*=" "secret\s*=" "token\s*="; do
            if grep -rnE "$pattern" src/ include/ 2>/dev/null | grep -v "//.*$pattern"; then
              FOUND=$((FOUND+1))
            fi
          done
          [ "$FOUND" -gt 0 ] && echo "Warning: Potential secrets found!" || echo "No obvious secrets"

  # ===========================================================================
  # JOB 9: DEPLOY (Main Branch Only)
  # ===========================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows-msvc, build-macos, code-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release Package
        run: |
          mkdir -p release
          ls artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # JOB 10: PR FAILURE NOTIFICATION
  # ===========================================================================
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [analyze, build-linux, build-windows-msvc, build-windows-mingw, build-macos]
    if: failure() && github.event_name == 'pull_request'
    
    steps:
      - name: Post Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Build Failed!**\n\nCI pipeline has failed. Please check the logs.'
            })
