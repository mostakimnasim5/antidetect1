name: C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build:
    name: Build C++ Project
    runs-on: ubuntu-latest
    
    steps:
    
    - name: Checkout
      uses: actions/checkout@v5
    
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ build-essential libssl-dev
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build --parallel 2 2>&1
    
    - name: Show outputs
      if: success()
      run: |
        echo "=== Build Successful ==="
        ls -la build/
